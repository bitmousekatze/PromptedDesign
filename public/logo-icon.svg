<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#f5f5f5"/>

  <!-- Outer subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="96" fill="none" stroke="#e0e0e0" stroke-width="4"/>

  <!-- The P shape - circle -->
  <circle cx="290" cy="200" r="96" stroke="#1a1a1a" stroke-width="30" fill="none"/>

  <!-- The P shape - vertical stem (left edge of circle, straight down) -->
  <line x1="194" y1="200" x2="194" y2="415" stroke="#1a1a1a" stroke-width="30" stroke-linecap="round"/>

  <!-- Inner rounded square -->
  <rect x="260" y="170" width="60" height="60" rx="12" fill="#1a1a1a"/>
</svg>
