  <body style="background:#000000;color:#fff;margin:0">
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#000000;font-family:system-ui,sans-serif">
        <div style="display:inline-flex;align-items:center;gap:0.5rem">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="24" height="24" style="animation:pa-fade-arc-spin 1s linear infinite;color:#6b7280;flex-shrink:0" role="status" aria-label="Loading spinner">
            <defs>
              <linearGradient id="il-leading" x1="50%" x2="50%" y1="5.271%" y2="91.793%">
                <stop offset="0%" stop-color="currentColor"/>
                <stop offset="100%" stop-color="currentColor" stop-opacity="0.55"/>
              </linearGradient>
              <linearGradient id="il-trailing" x1="50%" x2="50%" y1="15.24%" y2="87.15%">
                <stop offset="0%" stop-color="currentColor" stop-opacity="0"/>
                <stop offset="100%" stop-color="currentColor" stop-opacity="0.55"/>
              </linearGradient>
            </defs>
            <g fill="none">
              <path d="M8.749.021a1.5 1.5 0 0 1 .497 2.958A7.5 7.5 0 0 0 3 10.375a7.5 7.5 0 0 0 7.5 7.5v3c-5.799 0-10.5-4.7-10.5-10.5C0 5.23 3.726.865 8.749.021" fill="url(#il-leading)" transform="translate(1.5 1.625)"/>
              <path d="M15.392 2.673a1.5 1.5 0 0 1 2.119-.115A10.48 10.48 0 0 1 21 10.375c0 5.8-4.701 10.5-10.5 10.5v-3a7.5 7.5 0 0 0 5.007-13.084a1.5 1.5 0 0 1-.115-2.118" fill="url(#il-trailing)" transform="translate(1.5 1.625)"/>
            </g>
          </svg>
          <span style="display:inline-flex;align-items:center;color:#a0a0a0;font-size:1rem;font-weight:500">Loading<span aria-hidden="true" style="display:inline-flex"><span style="animation:pa-text-dots 1.4s infinite;animation-delay:0.2s">.</span><span style="animation:pa-text-dots 1.4s infinite;animation-delay:0.4s">.</span><span style="animation:pa-text-dots 1.4s infinite;animation-delay:0.6s">.</span></span></span>
        </div>
      </div>
      <style>@keyframes pa-fade-arc-spin{to{transform:rotate(360deg)}}@keyframes pa-text-dots{0%,100%{opacity:0}50%{opacity:1}}</style>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        console.error('[Prompted] Global error:', e.error || e.message);
        var root = document.getElementById('root');
        if (root && !root.dataset.appLoaded) {
          root.innerHTML = '<div style="padding:2rem;color:white;background:#000000;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui"><div><h1 style="color:#ff6b6b">Failed to load app</h1><p style="color:#a0a0a0;margin-top:1rem">Error: ' + (e.message || 'Unknown error') + '</p><button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1rem;background:#fff;color:#000;border:none;border-radius:6px;cursor:pointer">Retry</button></div></div>';
        }
      });
    </script>
