  <body style="background:#0a0a0a;color:#fff;margin:0">
    <div id="root">
      <div id="initial-loader" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0a0a;font-family:system-ui,sans-serif">
        <div style="text-align:center">
          <div style="width:40px;height:40px;border:3px solid #333;border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>
          <p style="color:#a0a0a0;margin-top:1rem;font-size:0.875rem">Loading...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      window.addEventListener('error', function(e) {
        console.error('[Prompted] Global error:', e.error || e.message);
        var root = document.getElementById('root');
        if (root && !root.dataset.appLoaded) {
          root.innerHTML = '<div style="padding:2rem;color:white;background:#0a0a0a;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui"><div><h1 style="color:#ff6b6b">Failed to load app</h1><p style="color:#a0a0a0;margin-top:1rem">Error: ' + (e.message || 'Unknown error') + '</p><button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1rem;background:#fff;color:#000;border:none;border-radius:6px;cursor:pointer">Retry</button></div></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
